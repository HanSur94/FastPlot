name: Example Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-mex:
    name: Build MEX
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    steps:
      - uses: actions/checkout@v4

      - name: Cache MEX binaries
        id: cache-mex
        uses: actions/cache@v4
        with:
          path: |
            libs/FastSense/private/*.mex
            libs/SensorThreshold/private/*.mex
            libs/FastSense/mksqlite.mex
          key: mex-linux-${{ hashFiles('libs/FastSense/private/mex_src/**', 'libs/FastSense/build_mex.m') }}

      - name: Compile MEX files
        if: steps.cache-mex.outputs.cache-hit != 'true'
        run: octave --eval "install();"

      - name: Upload MEX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mex-linux-examples
          path: |
            libs/FastSense/private/*.mex
            libs/SensorThreshold/private/*.mex
            libs/FastSense/mksqlite.mex
          retention-days: 1

  smoke-test:
    name: Example Smoke Tests
    needs: build-mex
    runs-on: ubuntu-latest
    container: gnuoctave/octave:8.4.0
    env:
      FASTSENSE_SKIP_BUILD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Download MEX binaries
        uses: actions/download-artifact@v4
        with:
          name: mex-linux-examples

      - name: Run example smoke tests
        run: |
          xvfb-run octave --eval "
            addpath(pwd); install();
            examples = {
              % --- Core ---
              'example_basic',
              'example_multi',
              'example_datetime',
              'example_nan_gaps',
              'example_vibration',
              'example_ecg',
              'example_linked',
              'example_uneven_sampling',
              'example_alarm_bands',
              'example_lttb_vs_minmax',
              'example_multi_sensor_linked',
              'example_navigator_overlay',
              'example_visual_features',
              'example_themes',
              'example_toolbar',
              'example_mixed_tiles',
              'example_100M',
              % --- Dashboard ---
              'example_dashboard',
              'example_dashboard_9tile',
              'example_dashboard_all_widgets',
              'example_dashboard_engine',
              'example_dashboard_groups',
              'example_dashboard_info',
              % --- Dock ---
              'example_dock',
              'example_dock_many_tabs',
              % --- Storage / Disk ---
              'example_disk_storage',
              'example_dock_disk',
              % --- Sensor ---
              'example_sensor_static',
              'example_sensor_multi_state',
              'example_sensor_threshold',
              'example_sensor_registry',
              'example_sensor_dashboard',
              'example_sensor_detail_basic',
              'example_sensor_detail_dashboard',
              'example_sensor_detail_datetime',
              'example_sensor_detail_dock',
              'example_sensor_todisk',
              % --- Widget ---
              'example_widget_barchart',
              'example_widget_fastsense',
              'example_widget_gauge',
              'example_widget_group',
              'example_widget_heatmap',
              'example_widget_histogram',
              'example_widget_image',
              'example_widget_multistatus',
              'example_widget_number',
              'example_widget_rawaxes',
              'example_widget_scatter',
              'example_widget_status',
              'example_widget_table',
              'example_widget_text',
              'example_widget_timeline',
              % --- Heavy ---
              'example_stress_test',
              'example_dynamic_thresholds_100M'
              % --- Skipped (require interaction / run indefinitely) ---
              % 'demo_all'                    — input() call
              % 'example_dashboard_live'      — live timer
              % 'example_event_detection_live' — live timer
              % 'example_event_viewer_from_file' — background timer
              % 'example_live_pipeline'       — starts 15s timer
              % 'example_sensor_detail'       — bare pause; calls
            };
            failed = {};
            for i = 1:numel(examples)
              name = examples{i};
              fprintf('Running %s... ', name);
              try
                cd('examples');
                feval(name);
                close all force;
                cd('..');
                fprintf('OK\n');
              catch e
                cd('..');
                fprintf('FAILED: %s\n', e.message);
                failed{end+1} = sprintf('%s: %s', name, e.message);
                close all force;
              end
            end
            fprintf('\n=== %d/%d examples passed ===\n', numel(examples)-numel(failed), numel(examples));
            if ~isempty(failed)
              fprintf('\nFailed:\n');
              for i = 1:numel(failed)
                fprintf('  - %s\n', failed{i});
              end
              exit(1);
            end
          "
