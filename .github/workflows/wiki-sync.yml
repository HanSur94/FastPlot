name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

permissions:
  contents: write

jobs:
  sync:
    name: Sync Wiki to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the wiki repo
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/HanSur94/FastPlot.wiki.git" wiki-repo

          # Copy wiki files (exclude .git)
          rsync -av --delete --exclude='.git' wiki/ wiki-repo/

          # Commit and push if there are changes
          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to sync"
          else
            git commit -m "sync: update wiki from main repo"
            git push
            echo "Wiki synced successfully"
          fi
